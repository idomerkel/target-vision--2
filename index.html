<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Target - Post-Process Engine & Telemetry</title>
    <script>
        var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        .video-box { position: relative; width: 640px; height: 480px; max-width: 95vw; max-height: 50vh; border: 3px solid #444; border-radius: 12px; overflow: hidden; background: #000; flex-shrink: 0; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: fill; }
        canvas.overlay { pointer-events: none; z-index: 10; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; margin: 5px; transition: background 0.3s; }
        
        /* Highlight disabled buttons clearly so the user knows they can't click them yet */
        button:disabled { background: #444 !important; color: #888; cursor: not-allowed; }
        
        #btnRecord.recording { background: #ff3b30; animation: pulse 1.5s infinite; }
        #status { font-weight: bold; font-size: 14px; color: #00ff00; margin-bottom: 10px; text-align: center; text-transform: uppercase; transition: color 0.3s; }
        .debug-view { width: 160px; height: 120px; border: 2px solid #555; background: #000; margin-top: 10px; border-radius: 4px; }
        
        .dashboard { display: flex; width: 400px; flex-direction: column; background: #161616; padding: 15px; overflow-y: auto; border-left: 2px solid #333; }
        .graph-container { width: 100%; height: 120px; background: #000; border: 1px solid #444; border-radius: 6px; margin-bottom: 15px; position: relative; flex-shrink: 0; }
        .graph-label { position: absolute; top: 5px; left: 5px; font-size: 10px; color: #888; z-index: 20; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 4px;}
        .split-view { display: flex; gap: 10px; flex: 1; overflow-y: hidden;}
        .feed-col { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-right: 5px;}
        .feed-col h3 { font-size: 13px; color: #aaa; margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .card { background: #222; border-radius: 8px; padding: 10px; border-left: 4px solid #444; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
        .card h4 { margin: 0 0 10px 0; color: #ffcc00; font-size: 14px; text-transform: uppercase; }
        .mistake { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 6px 0; font-size: 13px; }
        .prob { font-weight: bold; font-size: 11px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="main">
        <h2 style="margin:0 0 5px 0; font-size: 18px;">Post-Process Analysis Engine</h2>
        <p id="status">Loading WASM...</p>
        <div class="video-box" id="vbox">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" class="overlay" width="640" height="480"></canvas>
        </div>
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button id="btnCam" onclick="startCamera()">1. Start Camera</button>
            <button id="btnBase" onclick="setBaseline()" disabled>2. Lock Baseline</button>
            <button id="btnRecord" onclick="toggleRecording()" disabled style="background:#28a745;">3. Record Session</button>
        </div>
        <canvas id="debugCanvas" class="debug-view"></canvas>
    </div>

    <div class="dashboard">
        <h3 style="margin: 0 0 5px 0; font-size: 16px;">Recorded Session Telemetry</h3>
        <div class="graph-container">
            <span class="graph-label">
                Gyro: <span style="color:#ff4444">Roll</span> | <span style="color:#44ff44">Pitch</span> | <span style="color:#4444ff">Yaw</span> <br>
                Accel: <span style="color:#ffaa00">X</span> | <span style="color:#00ffff">Y</span> | <span style="color:#ff00ff">Z</span>
            </span>
            <canvas id="gyroGraph" width="370" height="120" style="position: absolute; top:0; left:0;"></canvas>
        </div>
        
        <div class="split-view">
            <div class="feed-col">
                <h3>Visual Tracking</h3>
                <div id="shotList"></div>
            </div>
            <div class="feed-col">
                <h3>Kinematic Errors</h3>
                <div id="kinematicList"></div>
            </div>
        </div>
    </div>

    <canvas id="calcCanvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // ==========================================
    // GLOBAL ARCHITECTURE
    // ==========================================
    let isRecording = false;
    let isAnalyzing = false;
    let isPreviewing = false; // Controls the Live HUD
    
    let stream;
    let mediaRecorder;
    let recordedChunks = [];
    let sensorLog = []; 
    let recordingStartTime = 0;

    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let cropSize = 0, targetRadius = 0, persistentShots = [], candidates = [], blacklist = [];
    let targetCenter = { x: 0, y: 0 }; 
    const PROXIMITY = 15.0, REQ_FRAMES = 4; 

    const GYRO_SHOT_THRESHOLD = 80;   
    const ACCEL_SHOT_THRESHOLD = 15;  
    const GYRO_MOVE_THRESH = 10.0;    
    const ACCEL_MOVE_THRESH = 1.5;    
    
    const mistakeDB = [
        { name: "Jerking the trigger", patterns: ["Down", "Pitch"] },
        { name: "Flinching/anticipating", patterns: ["Down", "Pitch"] },
        { name: "Inconsistent finger placement", patterns: ["Left", "Yaw", "Right"] },
        { name: "Poor grip/stance", patterns: ["Left", "Right", "Roll"] },
        { name: "Not following through", patterns: ["Down", "Pitch"] },
        { name: "Canting firearm", patterns: ["Roll"] },
        { name: "Fatigue/shaking", patterns: ["Up", "Down", "Left", "Right"] }
    ];

    function onOpenCvReady() {
        document.getElementById('status').innerText = "System Ready.";
        
        const canvas = document.getElementById('gyroGraph');
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#333';
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
        ctx.fillStyle = "#888"; ctx.font = "11px sans-serif";
        ctx.fillText("Graph will generate after recording stops.", 10, 30);
    }

    // ==========================================
    // 1. DATA ACQUISITION & SENSORS
    // ==========================================
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } })
            .then(s => { 
                stream = s;
                document.getElementById('webcam').srcObject = stream; 
                document.getElementById('btnCam').style.display = 'none';
                
                // Fire up the target-hunting HUD instantly
                isPreviewing = true;
                previewLoop();
                
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(state => {
                        if (state === 'granted') window.addEventListener('devicemotion', handleMotion);
                    }).catch(console.error);
                } else {
                    window.addEventListener('devicemotion', handleMotion); 
                }
            }).catch(e => {
                console.error(e);
                document.getElementById('status').innerText = "Camera Error.";
            });
    }

    function handleMotion(event) {
        if (!isRecording) return; 

        let ax = event.accelerationIncludingGravity?.x || event.acceleration?.x || 0;
        let ay = event.accelerationIncludingGravity?.y || event.acceleration?.y || 0;
        let az = event.accelerationIncludingGravity?.z || event.acceleration?.z || 0;
        let gx = event.rotationRate?.alpha || 0; 
        let gy = event.rotationRate?.beta || 0;  
        let gz = event.rotationRate?.gamma || 0; 

        sensorLog.push({
            time_ms: performance.now() - recordingStartTime,
            ax: ax, ay: ay, az: az, gx: gx, gy: gy, gz: gz
        });
    }

    function grab() {
        let cvs = document.getElementById('calcCanvas');
        cvs.getContext('2d').drawImage(document.getElementById('webcam'), 0,0,640,480);
        return cv.imread(cvs);
    }

    // ==========================================
    // 2. TARGET LOCKING HUD SYSTEM
    // ==========================================
    function previewLoop() {
        if (!isPreviewing) return;

        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        
        // Show what the engine sees in the debug box
        cv.imshow('debugCanvas', thresh);

        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        
        // Using RETR_LIST so it ignores the paper bounds and finds the circular ink
        cv.findContours(thresh, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let cnt = contours.get(i);
            let a = cv.contourArea(cnt);
            
            if (a > 3000) {
                let rect = cv.boundingRect(cnt);
                let aspect = rect.width / rect.height;
                
                // Allow a tiny bit of tilt, but enforce circularity
                if(aspect > 0.75 && aspect < 1.3 && a > maxA) { 
                    maxA = a; 
                    best = cv.minEnclosingCircle(cnt); 
                }
            }
        }

        let ctx = document.getElementById('overlayCanvas').getContext('2d');
        ctx.clearRect(0,0,640,480);

        let btnBase = document.getElementById('btnBase');
        let statusTxt = document.getElementById('status');

        if (best) {
            // Draw Target Reticle
            ctx.beginPath();
            ctx.arc(best.center.x, best.center.y, best.radius, 0, 2 * Math.PI);
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.8)';
            ctx.stroke();

            // Draw Crosshairs
            ctx.beginPath();
            ctx.moveTo(best.center.x - 15, best.center.y);
            ctx.lineTo(best.center.x + 15, best.center.y);
            ctx.moveTo(best.center.x, best.center.y - 15);
            ctx.lineTo(best.center.x, best.center.y + 15);
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.8)';
            ctx.stroke();

            // Wake up the Lock Button
            btnBase.disabled = false;
            btnBase.style.background = "#28a745"; 
            statusTxt.innerText = "TARGET ACQUIRED - READY TO LOCK";
            statusTxt.style.color = "#00ff00";
        } else {
            // Freeze the Lock Button
            btnBase.disabled = true;
            btnBase.style.background = ""; 
            statusTxt.innerText = "SEARCHING... ALIGN TARGET IN CAMERA";
            statusTxt.style.color = "#ffaa00"; 
        }

        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
        
        if (isPreviewing) requestAnimationFrame(previewLoop);
    }

    // ==========================================
    // 3. BASELINE MATH
    // ==========================================
    function setBaseline() {
        // Stop drawing the live HUD
        isPreviewing = false; 
        document.getElementById('overlayCanvas').getContext('2d').clearRect(0,0,640,480);

        if(!orb) { 
            orb = new cv.ORB(1500); matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); 
            refKP = new cv.KeyPointVector(); refDesc = new cv.Mat(); 
        }
        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        
        // Again, use RETR_LIST to pierce through the paper border
        cv.findContours(thresh, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
        
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let cnt = contours.get(i);
            let a = cv.contourArea(cnt);
            if (a > 3000) {
                let rect = cv.boundingRect(cnt);
                let aspect = rect.width / rect.height;
                if(aspect > 0.75 && aspect < 1.3 && a > maxA) { 
                    maxA = a; 
                    best = cv.minEnclosingCircle(cnt); 
                }
            }
        }
        
        // If the user managed to hit lock right as a shadow broke the image
        if(!best) { 
            alert("Error: Target lost during lock. Please try again."); 
            frame.delete(); gray.delete(); thresh.delete(); 
            isPreviewing = true; 
            previewLoop(); 
            return; 
        }

        targetRadius = Math.round(best.radius);
        cropSize = targetRadius * 2 + 60;
        
        let rx = Math.max(0, best.center.x - cropSize/2);
        let ry = Math.max(0, best.center.y - cropSize/2);
        let rw = Math.min(640 - rx, cropSize);
        let rh = Math.min(480 - ry, cropSize);
        let rect = new cv.Rect(rx, ry, rw, rh);
        
        targetCenter = { x: best.center.x - rx, y: best.center.y - ry };

        let roi = frame.roi(rect);
        if(refGray) refGray.delete();
        refGray = new cv.Mat();
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 10, new cv.Scalar(255), -1);
        orb.detectAndCompute(refGray, mask, refKP, refDesc);

        document.getElementById('btnRecord').disabled = false;
        document.getElementById('btnBase').style.display = 'none';
        document.getElementById('status').innerText = "TARGET LOCKED. READY TO RECORD.";
        document.getElementById('status').style.color = "#00ff00";
        
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }


    // ==========================================
    // 4. POST-PROCESS RECORDING FLOW
    // ==========================================
    function toggleRecording() {
        let btn = document.getElementById('btnRecord');

        if (!isRecording) {
            recordedChunks = [];
            sensorLog = [];
            persistentShots = []; 
            document.getElementById('shotList').innerHTML = "";
            document.getElementById('kinematicList').innerHTML = "";
            document.getElementById('overlayCanvas').getContext('2d').clearRect(0,0,640,480);
            
            const canvas = document.getElementById('gyroGraph');
            canvas.getContext('2d').clearRect(0,0,canvas.width, canvas.height);

            let options = { mimeType: 'video/webm; codecs=vp8' };
            if (!MediaRecorder.isTypeSupported('video/webm; codecs=vp8')) options = { mimeType: 'video/mp4' }; 

            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = triggerAnalysisPhase;

            recordingStartTime = performance.now();
            isRecording = true;
            mediaRecorder.start();

            btn.innerText = "Stop & Analyze";
            btn.classList.add("recording");
            document.getElementById('status').innerText = "🔴 RECORDING RAW DATA...";
            document.getElementById('status').style.color = "#ff3b30";

        } else {
            isRecording = false;
            mediaRecorder.stop(); 
            btn.style.display = 'none'; 
        }
    }

    function triggerAnalysisPhase() {
        document.getElementById('status').innerText = "⚙️ ANALYZING DATA...";
        document.getElementById('status').style.color = "#00aaff";

        drawRecordedGraph();
        processEntireSensorLog();

        let videoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        let videoURL = URL.createObjectURL(videoBlob);
        
        let videoElement = document.getElementById('webcam');
        videoElement.srcObject = null; 
        videoElement.src = videoURL;   
        
        videoElement.onplay = () => {
            isAnalyzing = true;
            trackingLoopPlayback();
        };

        videoElement.onended = () => {
            isAnalyzing = false;
            document.getElementById('status').innerText = "✅ ANALYSIS COMPLETE (Review Mode)";
            document.getElementById('status').style.color = "#00ff00";
            
            let btn = document.getElementById('btnRecord');
            btn.style.display = 'block';
            btn.style.background = "#007bff";
            btn.innerText = "Reset Camera for Next Run";
            btn.classList.remove("recording");
            btn.onclick = resetForNextRun; 
        };

        videoElement.play();
    }

    function resetForNextRun() {
        let videoElement = document.getElementById('webcam');
        videoElement.src = "";
        videoElement.srcObject = stream;
        videoElement.play();
        
        document.getElementById('overlayCanvas').getContext('2d').clearRect(0,0,640,480);
        
        let btn = document.getElementById('btnRecord');
        btn.style.display = 'none';
        btn.style.background = "#28a745";
        btn.innerText = "3. Record Session";
        btn.onclick = toggleRecording;

        // Wake the Lock button and HUD up again
        document.getElementById('btnBase').style.display = 'inline-block';
        isPreviewing = true;
        previewLoop();
    }


    // ==========================================
    // 5. THE PHYSICS & VISION MATH
    // ==========================================
    function drawRecordedGraph() {
        const canvas = document.getElementById('gyroGraph');
        if (!canvas || sensorLog.length === 0) return;
        const ctx = canvas.getContext('2d');
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

        const step = canvas.width / sensorLog.length;

        function plotLine(key, color, scaleMultiplier, offset = 0) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.0; 
            ctx.beginPath();
            for (let i = 0; i < sensorLog.length; i++) {
                let val = (sensorLog[i][key] || 0) - offset; 
                let x = i * step;
                let y = (canvas.height / 2) - (val * scaleMultiplier); 
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        plotLine('gx', '#ff4444', 0.5); 
        plotLine('gy', '#44ff44', 0.5); 
        plotLine('gz', '#4444ff', 0.5); 
        plotLine('ax', '#ffaa00', 5.0); 
        plotLine('ay', '#00ffff', 5.0); 
        plotLine('az', '#ff00ff', 5.0, 9.8); 
    }

    function processEntireSensorLog() {
        let lastSpikeTime = -1000;
        let shotCounter = 0;

        for (let i = 0; i < sensorLog.length; i++) {
            let s = sensorLog[i];
            if (s.time_ms - lastSpikeTime > 500) {
                if (Math.abs(s.gx) > GYRO_SHOT_THRESHOLD || Math.abs(s.gy) > GYRO_SHOT_THRESHOLD || Math.abs(s.ax) > ACCEL_SHOT_THRESHOLD) {
                    lastSpikeTime = s.time_ms;
                    shotCounter++;
                    let preShotSlice = sensorLog.filter(data => data.time_ms >= s.time_ms - 400 && data.time_ms <= s.time_ms);
                    diagnoseKinematics(preShotSlice, shotCounter);
                }
            }
        }
    }

    function diagnoseKinematics(dataSlice, shotId) {
        let down = false, up = false, left = false, right = false;
        let pitch = false, yaw = false, roll = false;
        let moveString = "";

        for (let s of dataSlice) {
            let adjustedZ = (s.az || 0) - 9.8; 
            if (s.ax > ACCEL_MOVE_THRESH) right = true;
            if (s.ax < -ACCEL_MOVE_THRESH) left = true;
            if (adjustedZ > ACCEL_MOVE_THRESH) up = true;
            if (adjustedZ < -ACCEL_MOVE_THRESH) down = true;
            if (Math.abs(s.gx) > GYRO_MOVE_THRESH) roll = true;
            if (Math.abs(s.gy) > GYRO_MOVE_THRESH) pitch = true;
            if (Math.abs(s.gz) > GYRO_MOVE_THRESH) yaw = true;
        }

        if (down) moveString += "Down,"; if (up) moveString += "Up,"; if (left) moveString += "Left,";
        if (right) moveString += "Right,"; if (pitch) moveString += "Pitch,"; if (yaw) moveString += "Yaw,";
        if (roll) moveString += "Roll,";

        let bestMatch = "Clean Break (Good)"; 
        let maxScore = 0;

        for (let mistake of mistakeDB) {
            let score = 0;
            for (let pattern of mistake.patterns) { if (moveString.includes(pattern)) score += 10; }
            if (score > maxScore) { maxScore = score; bestMatch = mistake.name; }
        }
        
        let cardColor = bestMatch === "Clean Break (Good)" ? "#00ff00" : "#ff3b30";
        document.getElementById('kinematicList').insertAdjacentHTML('beforeend', `
            <div class="card" style="border-left-color: ${cardColor};">
                <h4 style="margin:0 0 5px 0; font-size:13px; color: ${cardColor};">Event K-${shotId}</h4>
                <div style="font-size: 13px; font-weight: bold; margin-top: 4px;">${bestMatch}</div>
                <div style="font-size: 10px; color: #777; margin-top: 4px;">Raw: ${moveString || "None"}</div>
            </div>
        `);
    }

    function trackingLoopPlayback() {
        if(!isAnalyzing) return;
        
        let v = document.getElementById('webcam');
        if (v.readyState >= 2) {
            let frame = grab();
            let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
            
            try {
                cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
                orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);

                if(!liveDesc.empty()) {
                    matcher.match(refDesc, liveDesc, matches);
                    let good = [];
                    for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 48) good.push(matches.get(i)); }
                    
                    if(good.length > 10) {
                        let srcP = [], dstP = [];
                        for(let m of good) { srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); }
                        let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP), matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                        let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);

                        if(!H.empty()) {
                            let invH = new cv.Mat(); cv.invert(H, invH, cv.DECOMP_LU);
                            let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                            
                            let refBlur = new cv.Mat(), warpedBlur = new cv.Mat();
                            cv.GaussianBlur(refGray, refBlur, new cv.Size(3, 3), 0);
                            cv.GaussianBlur(warped, warpedBlur, new cv.Size(3, 3), 0);

                            let diff = new cv.Mat(), thresh = new cv.Mat();
                            cv.absdiff(refBlur, warpedBlur, diff);
                            cv.threshold(diff, thresh, 50, 255, cv.THRESH_BINARY);

                            let liveMask = cv.Mat.zeros(refGray.rows, refGray.cols, cv.CV_8UC1);
                            // Only look for holes strictly inside the circle boundaries
                            cv.circle(liveMask, new cv.Point(targetCenter.x, targetCenter.y), targetRadius - 15, new cv.Scalar(255), -1);
                            
                            let maskedThresh = new cv.Mat();
                            thresh.copyTo(maskedThresh, liveMask);

                            cv.imshow('debugCanvas', maskedThresh);

                            let contours = new cv.MatVector(), hier = new cv.Mat();
                            cv.findContours(maskedThresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                            
                            let currentHoles = [];
                            for(let i=0; i<contours.size(); i++) {
                                let cnt = contours.get(i), area = cv.contourArea(cnt);
                                
                                if(area > 15 && area < 600) {
                                    let M = cv.moments(cnt);
                                    let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                                    
                                    // The hard mathematical boundary check
                                    let distFromCenter = Math.hypot(p.x - targetCenter.x, p.y - targetCenter.y);
                                    if (distFromCenter > targetRadius - 15) continue; 

                                    if(blacklist.some(b => Math.hypot(b.x-p.x, b.y-p.y) < PROXIMITY)) continue;

                                    let hull = new cv.Mat(); cv.convexHull(cnt, hull);
                                    let solidity = area / (cv.contourArea(hull) || 1);
                                    hull.delete();

                                    if(solidity > 0.80) currentHoles.push(p);
                                    else if(solidity < 0.65) blacklist.push(p); 
                                }
                            }
                            processShots(currentHoles);
                            drawOverlay(H);
                            
                            invH.delete(); warped.delete(); diff.delete(); thresh.delete(); 
                            refBlur.delete(); warpedBlur.delete(); liveMask.delete(); maskedThresh.delete(); 
                            contours.delete(); hier.delete(); H.delete();
                        }
                        matSrc.delete(); matDst.delete();
                    }
                }
            } catch(e) { console.error(e); } finally {
                frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
            }
        }
        if (isAnalyzing) requestAnimationFrame(trackingLoopPlayback);
    }

    function processShots(holes) {
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < PROXIMITY)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < PROXIMITY);
            if(c) { 
                c.f++; 
                if(c.f >= REQ_FRAMES) {
                    persistentShots.push({id: Date.now(), x:h.x, y:h.y, d: getDiag(h.x, h.y)});
                    
                    const s = persistentShots[persistentShots.length - 1];
                    document.getElementById('shotList').insertAdjacentHTML('beforeend', `
                        <div class="card" style="border-left-color: #00aaff;">
                            <h4 style="margin:0 0 5px 0; font-size:13px; color:#00aaff;">Shot V-${persistentShots.length}: ${s.d.z} Zone</h4>
                            ${s.d.m.map(m => `<div class="mistake"><span>${m.n}</span><span class="prob" style="color:${m.p==='High'?'#ff3b30':'#00ff00'}">${m.p}</span></div>`).join('')}
                        </div>
                    `);
                    
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
        candidates.forEach(c => { c.f -= 0.1; });
        candidates = candidates.filter(c => c.f > 0);
    }

    function getDiag(x, y) {
        let dx = x - targetCenter.x, dy = targetCenter.y - y;
        let a = Math.atan2(dy, dx) * (180/Math.PI); if(a < 0) a += 360;
        
        if(a > 45 && a <= 135) return {z:"High", m:[{n:"Riding Recoil", p:"High"},{n:"Heeling", p:"Med"},{n:"Breathing", p:"Low"}]};
        if(a > 135 && a <= 225) return {z:"Left", m:[{n:"Trigger Depth", p:"High"},{n:"Grip Tension", p:"Med"},{n:"Wrist Roll", p:"Low"}]};
        if(a > 225 && a <= 315) return {z:"Low", m:[{n:"Trigger Jerking", p:"High"},{n:"Anticipation", p:"Med"},{n:"Flinching", p:"Low"}]};
        return {z:"Right", m:[{n:"Finger Tip Pressure", p:"High"},{n:"Thumb Pressure", p:"Med"},{n:"Cheek Weld", p:"Low"}]};
    }

    function drawOverlay(H) {
        let ctx = document.getElementById('overlayCanvas').getContext('2d');
        ctx.clearRect(0,0,640,480);
        persistentShots.forEach((s, idx) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            let x = dP.data64F[0]/dP.data64F[2], y = dP.data64F[1]/dP.data64F[2];
            ctx.beginPath(); ctx.arc(x,y,10,0,6.28); ctx.fillStyle="rgba(0,255,0,0.7)"; ctx.fill();
            ctx.strokeStyle="white"; ctx.stroke();
            ctx.fillStyle="white"; ctx.font="11px sans-serif"; ctx.fillText("#"+(idx+1), x+14, y);
            p.delete(); dP.delete();
        });
    }
</script>
